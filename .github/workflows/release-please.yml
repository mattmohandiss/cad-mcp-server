name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: node
          package-name: cad-mcp-server

      # Once a release has been published, build WASM and publish to npm.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_published }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
        if: ${{ steps.release.outputs.release_published }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: network=host
        if: ${{ steps.release.outputs.release_published }}

      - name: Build OCCT builder (cached)
        if: ${{ steps.release.outputs.release_published }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile.builder
          tags: localhost:5000/occt-wasm-builder
          push: true
          cache-from: type=gha,scope=occt-builder
          cache-to: type=gha,mode=max,scope=occt-builder

      - name: Build WASM (cached)
        if: ${{ steps.release.outputs.release_published }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile
          build-args: ENABLE_WASM_OPT=1
          tags: occt-wasm
          load: true
          cache-from: type=gha,scope=occt-wasm
          cache-to: type=gha,mode=max,scope=occt-wasm
          build-contexts: |
            occt-wasm-builder=docker-image://localhost:5000/occt-wasm-builder

      - name: Extract WASM artifacts
        if: ${{ steps.release.outputs.release_published }}
        run: |
          cid=$(docker create occt-wasm)
          mkdir -p occt/dist occt/ts/dist
          docker cp "$cid":/workspace/dist/. occt/dist/
          docker cp "$cid":/workspace/ts/dist/. occt/ts/dist/
          docker rm "$cid"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_published }}
        run: npm ci

      - name: Install occt-wasm dev dependencies
        if: ${{ steps.release.outputs.release_published }}
        run: cd occt/ts && npm ci

      - name: Build TypeScript
        if: ${{ steps.release.outputs.release_published }}
        run: npm run build

      - name: Run tests
        if: ${{ steps.release.outputs.release_published }}
        run: npm test

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_published }}
        run: npm publish --provenance
