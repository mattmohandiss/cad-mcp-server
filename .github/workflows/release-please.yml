name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    steps:
      # RELEASE_PLEASE_TOKEN is a classic PAT with contents:write and
      # pull_requests:write scopes.  Needed so release-please PRs trigger
      # normal CI (GITHUB_TOKEN cannot trigger downstream workflows by design).
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node

      # Once a GitHub Release is created, build WASM and publish to npm.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: network=host
        if: ${{ steps.release.outputs.release_created }}

      - name: Build OCCT builder (cached)
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile.builder
          tags: localhost:5000/occt-wasm-builder
          push: true
          cache-from: type=gha,scope=occt-builder
          cache-to: type=gha,mode=max,scope=occt-builder

      - name: Build WASM (cached)
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile
          build-args: ENABLE_WASM_OPT=1
          tags: occt-wasm
          load: true
          cache-from: type=gha,scope=occt-wasm
          cache-to: type=gha,mode=max,scope=occt-wasm
          build-contexts: |
            occt-wasm-builder=docker-image://localhost:5000/occt-wasm-builder

      - name: Extract WASM artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cid=$(docker create occt-wasm)
          mkdir -p occt/dist occt/ts/dist
          docker cp "$cid":/workspace/dist/. occt/dist/
          docker cp "$cid":/workspace/ts/dist/. occt/ts/dist/
          docker rm "$cid"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Install occt-wasm dev dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: cd occt/ts && npm ci

      - name: Build TypeScript
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Run tests
        if: ${{ steps.release.outputs.release_created }}
        run: npm test

      - name: Smoke-test packed CLI
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm pack --pack-destination /tmp
          cd /tmp && rm -rf smoke-test && mkdir smoke-test && cd smoke-test
          npm init -y > /dev/null 2>&1
          npm install /tmp/cad-mcp-server-*.tgz
          node -e "import('cad-mcp-server').then(()=>console.log('smoke ok')).catch(e=>{console.error(e);process.exit(1)})"

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish

      - name: Install MCP Registry publisher
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: |
          max=5
          for n in $(seq 0 $((max - 1))); do
            if [ "$n" -gt 0 ]; then
              wait=$((2 ** n * 15))
              echo "Retry $n/$((max - 1)) in ${wait}s..."
              sleep "$wait"
            fi
            echo "MCP Registry publish attempt $((n + 1))/$max..."
            if ./mcp-publisher publish; then
              echo "MCP Registry publish succeeded"
              exit 0
            fi
          done
          echo "MCP Registry publish failed after $max attempts"
          exit 1
