name: CI

on:
  pull_request:
  push:
    branches: [main]

# Auto-cancel superseded runs for the same ref (PR or branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: network=host

      - name: Install root dependencies
        run: npm ci

      - name: Install occt-wasm dev dependencies
        run: cd occt/ts && npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: 1.95
          components: rustfmt clippy

      - name: Install just
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2
        with:
          tool: just

      - name: Check formatting, lint, and tests
        run: just check

      # Build WASM and run kernel tests on release-gating runs only:
      # push to main, or PR targeting main.
      - name: Build OCCT builder image (cached)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile.builder
          tags: localhost:5000/occt-wasm-builder
          push: true
          cache-from: type=gha,scope=occt-builder
          cache-to: type=gha,mode=max,scope=occt-builder

      - name: Build WASM (cached)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: occt
          file: occt/Dockerfile
          build-args: ENABLE_WASM_OPT=0
          tags: occt-wasm
          load: true
          cache-from: type=gha,scope=occt-wasm
          cache-to: type=gha,mode=max,scope=occt-wasm
          build-contexts: |
            occt-wasm-builder=docker-image://localhost:5000/occt-wasm-builder

      - name: Extract WASM artifacts
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: |
          cid=$(docker create occt-wasm)
          mkdir -p occt/dist occt/ts/dist
          docker cp "$cid":/workspace/dist/. occt/dist/
          docker cp "$cid":/workspace/ts/dist/. occt/ts/dist/
          docker rm "$cid"

      - name: Run tests with WASM
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm test

  # Fails the PR if a new dep adds a critical-severity vulnerability.
  # Catches typosquatted packages, known-bad transitive deps, etc.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: critical
